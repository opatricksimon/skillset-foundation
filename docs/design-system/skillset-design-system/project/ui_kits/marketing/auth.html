<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Create your Skillset account</title>
  <link rel="stylesheet" href="../../colors_and_type.css"/>
  <link rel="stylesheet" href="auth.css"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="app"></div>
  <script type="text/babel">
    const { useState } = React;

    function GoogleMark() { return (
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.79 2.72v2.26h2.9c1.7-1.57 2.69-3.88 2.69-6.62z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.83.86-3.06.86-2.35 0-4.34-1.59-5.05-3.73H.95v2.34A9 9 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.95 10.71A5.4 5.4 0 0 1 3.66 9c0-.59.1-1.17.29-1.71V4.95H.95A9 9 0 0 0 0 9c0 1.45.35 2.83.95 4.05l3-2.34z" fill="#FBBC05"/>
        <path d="M9 3.58c1.32 0 2.51.46 3.44 1.35l2.58-2.58A9 9 0 0 0 9 0 9 9 0 0 0 .95 4.95l3 2.34C4.66 5.17 6.65 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
    ); }
    function AppleMark() { return (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.5 12.5c0-2.3 1.9-3.4 2-3.5-1.1-1.6-2.8-1.8-3.4-1.8-1.5-.2-2.8.8-3.6.8-.7 0-1.9-.8-3.1-.8-1.6 0-3.1.9-3.9 2.4-1.7 2.9-.4 7.2 1.2 9.5.8 1.1 1.7 2.4 3 2.4 1.2 0 1.6-.8 3.1-.8 1.4 0 1.8.8 3.1.8 1.3 0 2.1-1.2 2.9-2.3.9-1.3 1.3-2.6 1.3-2.7-.1 0-2.6-1-2.6-4zm-2.5-7.3c.7-.8 1.1-1.9 1-3-1 0-2.1.6-2.8 1.5-.6.7-1.2 1.8-1 2.9 1.1.1 2.2-.6 2.8-1.4z"/>
      </svg>
    ); }
    function EyeIcon({open}) { return (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        {open
          ? <><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></>
          : <><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 8 10 8a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></>
        }
      </svg>
    ); }
    function ArrowLeft() { return (
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="m12 19-7-7 7-7M19 12H5"/>
      </svg>
    ); }

    function AuthPage() {
      const params = new URLSearchParams(location.search);
      const initialMode = params.get("mode") === "signin" ? "signin" : "signup";
      const [mode, setMode] = useState(initialMode);
      const [showPw, setShowPw] = useState(false);
      const [name, setName] = useState("");
      const [email, setEmail] = useState("");
      const [pw, setPw] = useState("");
      const [tos, setTos] = useState(false);

      function submit(e) {
        e.preventDefault();
        location.href = "loading.html?next=welcome";
      }

      const isSignup = mode === "signup";

      return (
        <div className="auth-page" data-screen-label="Auth · Create account">
          <div className="auth-topbar">
            <a className="logo" href="index.html"><img src="../../assets/skillset-logo.png" alt="Skillset"/></a>
            <a className="back" href="index.html"><ArrowLeft/> Back to home</a>
          </div>
          <main className="auth-main">
            <div className="auth-card">
              <div className="auth-tabs" role="tablist">
                <button className={isSignup?"active":""} onClick={()=>setMode("signup")}>Create account</button>
                <button className={!isSignup?"active":""} onClick={()=>setMode("signin")}>Sign in</button>
              </div>
              <div className="eyebrow">{isSignup ? "Join Skillset" : "Welcome back"}</div>
              <h1>{isSignup ? "Create your account." : "Sign in to Skillset."}</h1>
              <p className="lead">{isSignup ? "Free to start. Browse programs, follow faculty, save a place in a cohort." : "Pick up where you left off."}</p>

              <div className="social-row">
                <button className="social-btn" type="button"><GoogleMark/> Continue with Google</button>
                <button className="social-btn" type="button"><AppleMark/> Continue with Apple</button>
              </div>
              <div className="divider">Or</div>

              <form className="auth-form" onSubmit={submit}>
                {isSignup && (
                  <label>
                    <span className="lbl">Full name</span>
                    <input value={name} onChange={e=>setName(e.target.value)} placeholder="Jamie Salgado" required/>
                  </label>
                )}
                <label>
                  <span className="lbl">Email</span>
                  <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" required/>
                </label>
                <label>
                  <span className="lbl">Password</span>
                  <div className="pw-wrap">
                    <input type={showPw?"text":"password"} value={pw} onChange={e=>setPw(e.target.value)} placeholder={isSignup?"At least 8 characters":"Your password"} required minLength={isSignup?8:1}/>
                    <button type="button" className="pw-toggle" onClick={()=>setShowPw(v=>!v)} aria-label="Toggle password"><EyeIcon open={showPw}/></button>
                  </div>
                </label>

                {isSignup && (
                  <label className="tos">
                    <input type="checkbox" checked={tos} onChange={e=>setTos(e.target.checked)} required/>
                    <span>By creating an account I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a>, and confirm I'm of legal age.</span>
                  </label>
                )}

                <button className="auth-cta" type="submit" disabled={isSignup && !tos}>
                  {isSignup ? "Create account" : "Sign in"}
                </button>

                {!isSignup && (
                  <div style={{textAlign:"center", marginTop:6}}>
                    <a href="#" style={{fontSize:13, color:"var(--color-primary)", fontWeight:600}}>Forgot password?</a>
                  </div>
                )}
              </form>

              <div className="auth-switch">
                {isSignup
                  ? <>Already have an account? <a onClick={(e)=>{e.preventDefault(); setMode("signin");}} href="#">Sign in</a></>
                  : <>New to Skillset? <a onClick={(e)=>{e.preventDefault(); setMode("signup");}} href="#">Create an account</a></>
                }
              </div>
            </div>
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("app")).render(<AuthPage/>);
  </script>
</body>
</html>
