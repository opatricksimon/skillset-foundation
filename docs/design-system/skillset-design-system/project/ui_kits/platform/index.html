<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Skillset · Platform Shell</title>
  <link rel="stylesheet" href="../../colors_and_type.css"/>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="app"></div>
  <script type="text/babel" src="Platform.jsx"></script>
  <script type="text/babel">
    const { useState } = React;

    const DEFAULT_PAGE = { student: "classroom", teacher: "overview", ops: "queue" };
    const PAGE_TITLE = {
      classroom: "Classroom", community: "Community", credentials: "Credentials",
      billing: "Billing", settings: "Settings",
      overview: "Overview", courses: "Courses", lessons: "Lessons", review: "In review",
      learners: "Learners", earnings: "Earnings",
      queue: "Review queue", flags: "Flagged", decisions: "Decisions", teachers: "Teachers",
    };

    function App() {
      const params = new URLSearchParams(location.search);
      const initialRole = ["student","teacher","ops"].includes(params.get("role")) ? params.get("role") : "student";
      const [role, setRole] = useState(initialRole);
      const [page, setPage] = useState(DEFAULT_PAGE[initialRole]);

      function changeRole(next) {
        setRole(next);
        setPage(DEFAULT_PAGE[next]);
      }

      return (
        <div className="app" data-screen-label={"Platform · " + role}>
          <Sidebar role={role} onRole={changeRole} active={page} onNav={setPage}/>
          <main className="main">
            <Topbar role={role} page={PAGE_TITLE[page] || page}/>
            { role === "student" && page === "classroom"   && <StudentPage/> }
            { role === "teacher" && page === "overview"    && <TeacherPage/> }
            { role === "ops"     && page === "queue"       && <OpsPage/> }
            { ( (role==="student" && page!=="classroom")
              || (role==="teacher" && page!=="overview")
              || (role==="ops"     && page!=="queue") )
              && (
                <div className="page">
                  <div className="page-head">
                    <div>
                      <span style={{fontSize:12, fontWeight:700, letterSpacing:".22em", textTransform:"uppercase", color:"var(--color-accent)"}}>{PAGE_TITLE[page] || page}</span>
                      <h1>{PAGE_TITLE[page] || page}</h1>
                      <p>This screen is part of the kit&rsquo;s navigation map. Open the primary page for each role to see fully-built layouts.</p>
                    </div>
                  </div>
                  <div className="stub">
                    <h3>Sample screen</h3>
                    <p>Sidebar, topbar, page header, panels and components are all in <code>Platform.jsx</code> &mdash; compose them for the screens you build.</p>
                  </div>
                </div>
              )
            }
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
  </script>
</body>
</html>
