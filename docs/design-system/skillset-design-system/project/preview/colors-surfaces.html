<!doctype html>
<html><head><meta charset="utf-8"><title>Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--color-base); color: var(--color-ink); }
  .card { box-sizing:border-box; padding: 24px; width: 700px; display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .panel { border-radius: 14px; padding: 18px; min-height: 140px; display:flex; flex-direction:column; justify-content:space-between; }
  .nm { font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; }
  .desc { font-size: 12px; color: var(--color-ink-soft); }
  .panel.base { background:#fff; border:1px solid var(--color-line); box-shadow: var(--shadow-soft); }
  .panel.soft { background:#f5f9ff; border:1px solid var(--color-line); }
  .panel.dark { background: linear-gradient(135deg,#0f2744 0%, #1a365d 100%); color:#fff; }
  .panel.dark .desc { color: rgba(255,255,255,.74); }
</style></head>
<body>
<div class="card">
  <div class="panel base"><span class="nm" style="color:#1a365d">Surface · Card</span><span class="desc">White, 1px line @12% navy, soft shadow. Default everywhere.</span></div>
  <div class="panel soft"><span class="nm" style="color:#1a365d">Surface · Soft</span><span class="desc">Page tint and nested fills inside cards.</span></div>
  <div class="panel dark"><span class="nm" style="color:#fff">Surface · Hero</span><span class="desc">Navy gradient + red bottom rule. Marketing only.</span></div>
</div>
</body></html>
