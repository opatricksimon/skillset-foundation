<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--color-base); color: var(--color-ink); }
  .card { box-sizing:border-box; padding: 24px; width: 700px; display:grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
  .item { display:flex; flex-direction:column; align-items:center; gap: 8px; }
  .box { width: 100%; height: 76px; background: #ebf3fb; border: 1px solid var(--color-line); }
  .nm { font-family: var(--font-mono); font-size: 11px; color: var(--color-primary); }
  .val { font-size: 11px; color: var(--color-ink-soft); }
</style></head>
<body>
<div class="card">
  <div class="item"><div class="box" style="border-radius:6px"></div><span class="nm">--radius-xs</span><span class="val">6 · badges</span></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><span class="nm">--radius-sm</span><span class="val">8 · buttons</span></div>
  <div class="item"><div class="box" style="border-radius:10px"></div><span class="nm">--radius-md</span><span class="val">10 · inputs</span></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><span class="nm">--radius-lg</span><span class="val">12 · dropdown</span></div>
  <div class="item"><div class="box" style="border-radius:14px"></div><span class="nm">--radius-xl</span><span class="val">14 · panel</span></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><span class="nm">--radius-2xl</span><span class="val">16 · feature</span></div>
  <div class="item"><div class="box" style="border-radius:18px"></div><span class="nm">--radius-3xl</span><span class="val">18 · card</span></div>
  <div class="item"><div class="box" style="border-radius:22px"></div><span class="nm">--radius-4xl</span><span class="val">22 · CTA</span></div>
</div>
</body></html>
