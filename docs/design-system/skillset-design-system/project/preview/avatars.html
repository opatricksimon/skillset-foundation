<!doctype html>
<html><head><meta charset="utf-8"><title>Avatar & Logo Marks</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--color-base); color: var(--color-ink); }
  .card { box-sizing:border-box; padding: 24px; width: 700px; display:flex; align-items:center; gap: 28px; }
  .av { border-radius: 999px; background: #1a365d; color:#fff; display:grid; place-items:center; font-weight: 700; letter-spacing: .02em; box-shadow: 0 8px 18px rgba(26,54,93,.14); font-family: var(--font-sans); }
  .lbl { font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--color-ink-soft); text-align:center; margin-top: 8px; }
  .col { display:flex; flex-direction:column; align-items:center; }
  .meta { padding: 8px 12px; border:1px solid var(--color-line); border-radius: 10px; background:#fff; display:flex; align-items:center; gap: 8px; }
  .meta .nm { font-size: 12px; font-weight: 700; color: var(--color-ink); }
  .meta .role { display:block; font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--color-accent); margin-top: 1px; }
</style></head>
<body>
<div class="card">
  <div class="col"><div class="av" style="width:28px;height:28px;font-size:11px;">JS</div><div class="lbl">sm · 28</div></div>
  <div class="col"><div class="av" style="width:36px;height:36px;font-size:13px;">JS</div><div class="lbl">md · 36</div></div>
  <div class="col"><div class="av" style="width:56px;height:56px;font-size:18px;">JS</div><div class="lbl">lg · 56</div></div>
  <div class="col">
    <div class="meta">
      <div class="av" style="width:28px;height:28px;font-size:11px;">JS</div>
      <div><div class="nm">Jamie Salgado</div><span class="role">Educator</span></div>
    </div>
    <div class="lbl">Account chip</div>
  </div>
</div>
</body></html>
