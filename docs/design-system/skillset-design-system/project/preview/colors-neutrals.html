<!doctype html>
<html><head><meta charset="utf-8"><title>Neutrals & Ink</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--color-base); color: var(--color-ink); }
  .card { box-sizing:border-box; padding: 24px; width: 700px; display:grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
  .sw { border-radius: 12px; padding: 14px; height: 110px; display:flex; flex-direction:column; justify-content: space-between; border:1px solid var(--color-line); }
  .nm { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; }
  .hex { font-family: var(--font-mono); font-size: 12px; }
</style></head>
<body>
<div class="card">
  <div class="sw" style="background:#ffffff; color:#163252;"><span class="nm">Base / Surface</span><span class="hex">#ffffff</span></div>
  <div class="sw" style="background:#f5f9ff; color:#163252;"><span class="nm">Surface Soft</span><span class="hex">#f5f9ff</span></div>
  <div class="sw" style="background:#ebf3fb; color:#163252;"><span class="nm">Surface Strong</span><span class="hex">#ebf3fb</span></div>
  <div class="sw" style="background:#f3d6dc; color:#7a1b27;"><span class="nm">Accent Soft</span><span class="hex">#f3d6dc</span></div>
  <div class="sw" style="background:#163252; color:#fff;"><span class="nm">Ink</span><span class="hex">#163252</span></div>
  <div class="sw" style="background:#4d6785; color:#fff;"><span class="nm">Ink Soft</span><span class="hex">#4d6785</span></div>
  <div class="sw" style="background:#7a8fae; color:#fff;"><span class="nm">Ink Muted</span><span class="hex">#7a8fae</span></div>
  <div class="sw" style="background:#fff; color:#163252;"><span class="nm">Line · 12% navy</span><span class="hex" style="color:#4d6785">rgba(26,54,93,.12)</span></div>
</div>
</body></html>
