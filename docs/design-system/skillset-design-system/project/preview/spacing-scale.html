<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--color-base); color: var(--color-ink); }
  .card { box-sizing:border-box; padding: 24px; width: 700px; display:flex; flex-direction:column; gap: 8px; }
  .row { display:grid; grid-template-columns: 60px 80px 1fr; align-items:center; gap: 16px; padding: 4px 0; }
  .token { font-family: var(--font-mono); font-size: 12px; color: var(--color-primary); }
  .val { font-size: 12px; color: var(--color-ink-soft); }
  .bar { height: 12px; background: #1a365d; border-radius: 4px; }
</style></head>
<body>
<div class="card">
  <div class="row"><span class="token">--space-1</span><span class="val">4 px</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="token">--space-2</span><span class="val">8 px</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="token">--space-3</span><span class="val">12 px</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="token">--space-4</span><span class="val">16 px</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="token">--space-5</span><span class="val">20 px</span><div class="bar" style="width:20px"></div></div>
  <div class="row"><span class="token">--space-6</span><span class="val">24 px</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="token">--space-7</span><span class="val">32 px</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="token">--space-8</span><span class="val">40 px</span><div class="bar" style="width:40px"></div></div>
  <div class="row"><span class="token">--space-9</span><span class="val">48 px</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="token">--space-10</span><span class="val">64 px</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="token">--space-11</span><span class="val">80 px</span><div class="bar" style="width:80px"></div></div>
</div>
</body></html>
