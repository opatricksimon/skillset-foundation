<!doctype html>
<html><head><meta charset="utf-8"><title>UI Type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--color-base); color: var(--color-ink); }
  .card { box-sizing:border-box; padding:24px 28px; width:700px; display:grid; grid-template-columns: 88px 1fr; row-gap: 12px; column-gap: 18px; align-items: baseline; }
  .meta { font-size: 11px; color: var(--color-ink-soft); letter-spacing: .14em; text-transform: uppercase; font-weight: 600; }
  .row { display: contents; }
  hr.div { grid-column: 1 / -1; border:0; border-top: 1px solid var(--color-line); margin: 4px 0; }
</style></head>
<body>
<div class="card">
  <div class="meta">H4 / 24</div>
  <div style="font-weight: 700; font-size: 24px; color: var(--color-primary); line-height: 1.2;">Courses in progress</div>

  <hr class="div">
  <div class="meta">Lead / 18</div>
  <div style="font-weight: 400; font-size: 18px; line-height: 1.6; color: var(--color-ink-soft);">A premium learning platform for expert-led courses.</div>

  <hr class="div">
  <div class="meta">Body / 14</div>
  <div style="font-weight: 400; font-size: 14px; line-height: 1.75; color: var(--color-ink-soft);">Drafts stay private. Approved courses keep receiving lessons while Skillset controls marketplace visibility.</div>

  <hr class="div">
  <div class="meta">Eyebrow / 12</div>
  <div style="font-weight: 600; font-size: 12px; letter-spacing: .22em; text-transform: uppercase; color: var(--color-accent);">For creators</div>

  <hr class="div">
  <div class="meta">Label / 10</div>
  <div style="font-weight: 700; font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--color-ink-soft);">Discover</div>
</div>
</body></html>
