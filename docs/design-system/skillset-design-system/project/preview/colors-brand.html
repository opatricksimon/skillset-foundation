<!doctype html>
<html><head><meta charset="utf-8"><title>Brand Colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--color-base); color: var(--color-ink); }
  .card { box-sizing:border-box; padding: 24px; width: 700px; display:grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { border-radius: 12px; padding: 14px; height: 110px; display:flex; flex-direction:column; justify-content: space-between; border: 1px solid var(--color-line); }
  .nm { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; }
  .hex { font-family: var(--font-mono); font-size: 12px; }
</style></head>
<body>
<div class="card">
  <div class="sw" style="background:#1a365d; color:#fff; border-color:#1a365d;"><span class="nm">Primary / Brand</span><span class="hex">#1a365d</span></div>
  <div class="sw" style="background:#0f2744; color:#fff; border-color:#0f2744;"><span class="nm">Primary Dark</span><span class="hex">#0f2744</span></div>
  <div class="sw" style="background:#2c5282; color:#fff; border-color:#2c5282;"><span class="nm">Primary Light</span><span class="hex">#2c5282</span></div>
  <div class="sw" style="background:#b22234; color:#fff; border-color:#b22234;"><span class="nm">Accent</span><span class="hex">#b22234</span></div>
</div>
</body></html>
