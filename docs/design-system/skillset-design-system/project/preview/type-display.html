<!doctype html>
<html><head><meta charset="utf-8"><title>Display Type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--color-base); }
  .card { box-sizing:border-box; padding:28px 32px; width:700px; }
  .row { display:flex; align-items:baseline; gap:18px; padding:6px 0; }
  .row + .row { border-top: 1px solid var(--color-line); padding-top: 14px; margin-top: 8px; }
  .specimen { font-family: var(--font-display); color: var(--color-primary); font-weight: 600; line-height: 0.98; letter-spacing: 0; }
  .meta { font-family: var(--font-sans); font-size: 11px; color: var(--color-ink-soft); letter-spacing: .14em; text-transform: uppercase; font-weight: 600; min-width: 88px; }
</style></head>
<body>
<div class="card">
  <div class="row"><span class="meta">72 / 0.98</span><span class="specimen" style="font-size:60px">Learn From The Best.</span></div>
  <div class="row"><span class="meta">48 / 1.02</span><span class="specimen" style="font-size:42px; color: var(--color-ink)">Featured learning pathways</span></div>
  <div class="row"><span class="meta">30 / 1.05</span><span class="specimen" style="font-size:30px">Your learning dashboard is ready.</span></div>
</div>
</body></html>
