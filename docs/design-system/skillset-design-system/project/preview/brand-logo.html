<!doctype html>
<html><head><meta charset="utf-8"><title>Brand Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--color-base); color: var(--color-ink); }
  .card { box-sizing:border-box; padding:24px; width:700px; display:grid; grid-template-columns: 1fr 1fr; gap:0; }
  .panel { padding:32px 28px; display:flex; align-items:center; justify-content:center; }
  .panel.light { background:#ffffff; border:1px solid var(--color-line); border-radius: 14px; }
  .panel.dark { background: var(--color-primary); border-radius: 14px; }
  .panel img { max-width: 240px; height:auto; }
  .label { margin-top:10px; font-size:10px; letter-spacing:.18em; font-weight:700; text-transform:uppercase; color: var(--color-ink-soft); }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
  .stack { display:flex; flex-direction:column; align-items:flex-start; }
</style></head>
<body>
<div class="card" style="display:block">
  <div class="grid">
    <div class="stack">
      <div class="panel light" style="width:100%; height:120px;"><img src="../assets/skillset-logo.png" alt="Skillset logo"></div>
      <div class="label">on white</div>
    </div>
    <div class="stack">
      <div class="panel dark" style="width:100%; height:120px;"><img src="../assets/skillset-logo.png" alt="Skillset logo" style="filter: brightness(0) invert(1);"></div>
      <div class="label">on navy (knock-out)</div>
    </div>
  </div>
</div>
</body></html>
