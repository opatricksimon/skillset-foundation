<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons · Light Surface</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--color-base); color: var(--color-ink); }
  .card { box-sizing:border-box; padding: 28px; width: 700px; display:flex; flex-direction:column; gap: 18px; background: #fff; }
  .row { display:flex; align-items:center; gap: 14px; }
  .lbl { width: 96px; font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--color-ink-soft); }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:.5rem; border-radius:8px; font-family: var(--font-sans); font-weight: 600; line-height: 1; text-decoration:none; transition: all 180ms ease; padding: 12px 18px; font-size: 14px; }
  .solid { border:1px solid #1a365d; background:#1a365d; color:#fff; box-shadow: inset 0 -2px 0 rgba(178,34,52,.35), 0 10px 22px rgba(26,54,93,.14); }
  .solid.hover { background:#0f2744; transform: translateY(-1px); box-shadow: 0 14px 28px rgba(15,39,68,.18); }
  .solid.disabled { opacity:.6; }
  .outline { border:1px solid rgba(26,54,93,.18); background: rgba(255,255,255,.92); color: #1a365d; }
  .outline.hover { background:#f5f9ff; color:#0f2744; border-color: rgba(26,54,93,.24); transform: translateY(-1px); }
</style></head>
<body>
<div class="card">
  <div class="row"><span class="lbl">Solid</span><span class="btn solid">Explore courses</span><span class="btn solid hover">Hover</span><span class="btn solid disabled">Disabled</span></div>
  <div class="row"><span class="lbl">Outline</span><span class="btn outline">View program</span><span class="btn outline hover">Hover</span></div>
  <div class="row"><span class="lbl">Sizes</span>
    <span class="btn solid" style="padding: 8px 14px; font-size: 12px;">Compact</span>
    <span class="btn solid" style="padding: 10px 16px; font-size: 13px;">Default</span>
    <span class="btn solid" style="padding: 14px 22px; font-size: 15px;">Large</span>
  </div>
</div>
</body></html>
